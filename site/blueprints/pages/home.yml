title: Home
description: System blueprint for the required home page.

tabs:
  - name: content
    label: Content
    nodes:
      - type: textarea
        name: text
        label: Intro
        rows: 8

  - name: pages
    label: Pages
    nodes:
      - type: page_list
        name: pages
        label: Pages
        source: site.home
        create:
          enabled: true
        empty: No pages yet.

  - name: files
    label: Files
    nodes:
      - type: file_list
        name: files
        label: Files
        source: site.home
        upload:
          enabled: true
        empty: Upload the first file.
